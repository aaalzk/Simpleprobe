# Goreleaser configuration for Simpleprobe (简易探针)
# Run: goreleaser release --clean

version: 1

before:
  hooks: []

builds:
  - id: agent
    main: ./cmd/agent
    binary: simpleprobe-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: server
    main: ./cmd/server
    binary: simpleprobe-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: agent
    builds: [agent]
    name_template: "simpleprobe-agent_{{ .Version }}_{{ .Arch }}"
    format: tar.gz
    files:
      - agent.yml.example

  - id: server
    builds: [server]
    name_template: "simpleprobe-server_{{ .Version }}_{{ .Arch }}"
    format: tar.gz
    files:
      - server.yml.example

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'